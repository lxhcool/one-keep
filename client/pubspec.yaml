name: one_keep
description: "OneKeep accounting app client."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  go_router: ^14.8.0
  flutter_secure_storage: ^9.2.0
  intl: ^0.19.0
  fl_chart: ^0.70.0
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.0
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.0
  record: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/app-logo.png
    - assets/category/
  fonts:
    - family: OneKeepIconFont
      fonts:
        - asset: assets/iconfont/iconfont.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app-logo.png
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#10B981"
  adaptive_icon_foreground: assets/images/app-logo.png
