name: liqing
description: "厘清 — 极简智能记账应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  go_router: ^14.8.0
  flutter_secure_storage: ^9.2.0
  intl: ^0.19.0
  fl_chart: ^0.70.0
  lucide_icons: ^0.257.0
  # google_fonts: 已移除，字体已打包到 assets/fonts
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.0
  record: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/login-logo.png
    - assets/category/
  fonts:
    - family: OneKeepIconFont
      fonts:
        - asset: assets/iconfont/iconfont.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-400.ttf
          weight: 400
        - asset: assets/fonts/Inter-500.ttf
          weight: 500
        - asset: assets/fonts/Inter-600.ttf
          weight: 600
        - asset: assets/fonts/Inter-700.ttf
          weight: 700
        - asset: assets/fonts/Inter-800.ttf
          weight: 800
        - asset: assets/fonts/Inter-900.ttf
          weight: 900
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-400.ttf
          weight: 400
        - asset: assets/fonts/Manrope-500.ttf
          weight: 500
        - asset: assets/fonts/Manrope-600.ttf
          weight: 600
        - asset: assets/fonts/Manrope-700.ttf
          weight: 700
        - asset: assets/fonts/Manrope-800.ttf
          weight: 800
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-400.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-500.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-600.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-700.ttf
          weight: 700
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-400.ttf
          weight: 400
        - asset: assets/fonts/SpaceMono-700.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/ic_launcher.png
  min_sdk_android: 21
  remove_alpha_ios: true
