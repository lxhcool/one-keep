version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: onekeep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onekeep
    ports:
      - "5432:5432"
    volumes:
      - onekeep_pgdata:/var/lib/postgresql/data

volumes:
  onekeep_pgdata:
