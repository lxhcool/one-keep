# ─── Nginx Configuration for one-keep API ────────────────────────────────────
# Listens on 80 (redirect) and 443 (TLS termination → proxy to api:3000)
# Replace YOUR_DOMAIN with your actual domain name.
# TLS certs are expected at /etc/nginx/certs/fullchain.pem + privkey.pem

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    sendfile        on;
    keepalive_timeout 65;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream api_backend {
        server api:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name onekeep.lxhcoool.cn;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name onekeep.lxhcool.cn;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/onekeep.lxhcoool.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/onekeep.lxhcoool.cn/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    nosniff   always;
        add_header X-Frame-Options           DENY      always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "no-referrer" always;

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;

            # Hide internal headers
            proxy_hide_header X-Powered-By;
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /api/health {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
            access_log       off;
        }
    }
}
